name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      # Maintains a release PR from Conventional Commits and, on merge, creates
      # the tag + GitHub Release that triggers release.yml to build and upload
      # the CLI binaries and VM disk images.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
