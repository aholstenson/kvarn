name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      # Run Release Please as a GitHub App rather than the default GITHUB_TOKEN.
      # Releases created by GITHUB_TOKEN do not emit events, so release.yml /
      # image-release.yml would never fire; an App token makes the published
      # release trigger them automatically.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      # Maintains a release PR from Conventional Commits and, on merge, creates
      # the tag + GitHub Release that triggers release.yml to build and upload
      # the CLI binaries and VM disk images.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
