dependencies:
  nixpkgs:
    - go
    - buf
    - go-task
    - ginkgo

setup:
  steps:
    - name: Generate code
      run: task generate
    
    - name: go mod tidy
      run: go mod tidy

validation:
  required:
    - name: Build everything
      run: task build

    - name: Run all tests
      run: task test
      timeout: 10m
