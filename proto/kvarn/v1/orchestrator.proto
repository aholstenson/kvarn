syntax = "proto3";

package kvarn.v1;

import "kvarn/v1/bridge.proto";

message StartJobRequest {
  string project = 1;
  string prompt = 2;
  string branch = 3;
  string mode = 4;
}

message StartJobResponse {
  string session_id = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  string session_id = 1;
  string project = 2;
  string state = 3;
  string message = 4;
  string error = 5;
  string prompt = 6;
  string pull_request_url = 7;
  string mode = 8;
  CostReport cost = 9;
}

// CostReport carries accumulated LLM spend for a job: totals across all
// models plus a per-model breakdown keyed by service name.
message CostReport {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 cached_tokens = 3;
  double total_usd = 4;
  repeated ModelCost per_model = 5;
}

message ModelCost {
  string model_id = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
  int64 cached_tokens = 4;
  double total_usd = 5;
}

// CostUpdate is broadcast on the session event stream when the budget warn
// threshold is crossed, when the hard cap is reached, and once at the end of
// each run as a final summary.
message CostUpdate {
  CostUpdateKind kind = 1;
  CostReport report = 2;
  double limit_usd = 3;
  double warn_fraction = 4;
}

enum CostUpdateKind {
  COST_UPDATE_KIND_UNSPECIFIED = 0;
  COST_UPDATE_KIND_WARNING = 1;
  COST_UPDATE_KIND_OVER_BUDGET = 2;
  COST_UPDATE_KIND_FINAL = 3;
}

message ListSessionsRequest {
  // Filter to a single project; empty means any project the caller may access.
  string project = 1;
  // When true, only non-terminal (active) sessions are returned.
  bool active_only = 2;
  // Maximum sessions to return; 0 lets the server pick a default.
  int32 limit = 3;
  // Opaque cursor from a previous response's next_page_cursor; empty starts
  // from the most recent session.
  string page_cursor = 4;
}

message ListSessionsResponse {
  repeated GetSessionResponse sessions = 1;
  // Opaque cursor to pass as the next request's page_cursor; empty when the
  // last page has been returned.
  string next_page_cursor = 2;
}

message WatchSessionRequest {
  string session_id = 1;
  // Resume cursor: only events with sequence > from_sequence are delivered.
  // 0 streams the full available history before live events.
  int64 from_sequence = 2;
}

message ListSessionEventsRequest {
  string session_id = 1;
  // Only events with sequence > after_sequence are returned.
  int64 after_sequence = 2;
  // Maximum events to return; 0 lets the server pick a default.
  int32 limit = 3;
}

message ListSessionEventsResponse {
  repeated SessionUpdate events = 1;
  // Sequence of the last event in this page; pass as the next request's
  // after_sequence to continue polling.
  int64 last_sequence = 2;
}

message SessionUpdate {
  string session_id = 1;
  string project = 2;
  // Durable per-session sequence number; 0 for ephemeral (live-only) events.
  int64 sequence = 3;

  oneof event {
    StateChange state_change = 10;
    AgentMessage agent_message = 11;
    AgentToolUse agent_tool_use = 12;
    AgentToolResult agent_tool_result = 13;
    StepResult step_result = 14;
    VmInfo vm_info = 15;
    StepOutput step_output = 16;
    TransferProgress transfer_progress = 17;
    DependencyOutput dependency_output = 18;
    CacheProgress cache_progress = 19;
    PullRequestCreated pull_request_created = 20;
    CostUpdate cost_update = 21;
  }
}

message StateChange {
  string state = 1;
  string message = 2;
  string error = 3;
}

message AgentMessage {
  string text = 1;
  bool final = 2;
  // Empty for the parent agent; identifier of the sub-agent run otherwise.
  string agent_id = 3;
}

message AgentToolUse {
  string tool_id = 1;
  string arguments_json = 2;
  string agent_id = 3;
}

message AgentToolResult {
  string tool_id = 1;
  string result = 2;
  bool is_error = 3;
  string agent_id = 4;
}

enum StepPhase {
  STEP_PHASE_UNSPECIFIED = 0;
  STEP_PHASE_SETUP = 1;
  STEP_PHASE_HEALTH_CHECK = 2;
  STEP_PHASE_VALIDATION_REQUIRED = 3;
  STEP_PHASE_VALIDATION_ADVISORY = 4;
}

message StepResult {
  string name = 1;
  StepPhase phase = 2;
  int32 exit_code = 3;
  string stdout = 4;
  string stderr = 5;
  bool passed = 6;
  bool skipped = 7;
}

message StepOutput {
  string name = 1;
  StepPhase phase = 2;
  string stdout = 3;
  string stderr = 4;
}

message TransferProgress {
  int64 bytes_sent = 1;
  int64 total_bytes = 2;
}

message DependencyOutput {
  string stdout = 1;
  string stderr = 2;
}

message CacheProgress {
  string path = 1;
  int32 index = 2;
  int32 total = 3;
  bool restoring = 4;
}

message PullRequestCreated {
  string url = 1;
  int32 number = 2;
  string branch = 3;
}

service OrchestratorService {
  rpc StartJob(StartJobRequest) returns (StartJobResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc WatchSession(WatchSessionRequest) returns (stream SessionUpdate);
  rpc ListSessionEvents(ListSessionEventsRequest) returns (ListSessionEventsResponse);
}
