version: "3"

tasks:
  generate:
    desc: Regenerate protobuf + ConnectRPC code
    cmds:
      - buf generate
    sources:
      - proto/**/*.proto
      - buf.gen.yaml
    generates:
      - gen/**/*.go

  build:
    desc: Build the kvarn binary with the embedded runner
    deps: [generate]
    cmds:
      - task: build:runner
      - go build -tags embedrunner ./cmd/kvarn
      - task: sign
        platforms: [darwin]

  build:runner:
    desc: Cross-compile the linux runner for embedding into the CLI
    deps: [generate]
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo dev
    cmds:
      - GOOS=linux GOARCH={{ARCH}} CGO_ENABLED=0 go build -ldflags "-X github.com/aholstenson/kvarn/internal/buildinfo.Version={{.VERSION}}" -o internal/runnerbin/kvarn-runner ./cmd/runner

  sign:
    desc: Ad-hoc codesign with virtualization entitlement (macOS only)
    platforms: [darwin]
    cmds:
      - codesign -f --entitlements entitlements.plist -s - kvarn

  test:
    desc: Run all tests
    deps: [generate]
    cmds:
      - ginkgo ./...

  test:verbose:
    desc: Run all tests with verbose output
    deps: [generate]
    cmds:
      - ginkgo -v ./...

  lint:
    desc: Run go vet
    deps: [generate]
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  image:build:
    desc: Build VM disk image for host architecture
    cmds:
      - ./image/build-image.sh

  image:build:arm64:
    desc: Build VM disk image for arm64
    cmds:
      - ARCH=arm64 ./image/build-image.sh

  image:build:amd64:
    desc: Build VM disk image for amd64
    cmds:
      - ARCH=amd64 ./image/build-image.sh

  image:clean:
    desc: Remove built VM image artifacts
    cmds:
      - rm -rf dist/

  clean:
    desc: Remove build artifacts and generated code
    cmds:
      - rm -rf gen/
      - rm -f kvarn
